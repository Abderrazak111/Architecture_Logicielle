eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka
spring.application.name=API-service


logging.level.root=INFO
logging.level.org.springframework.cloud.gateway.route.routeDefinitionLocator = INFO
logging.level.org.springframework.cloud.gateway = TRACE


#Product-server
spring.cloud.gateway.server.webmvc.routes[0].id=product-server
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://product-server
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=path=/api/products


#Order-server
spring.cloud.gateway.server.webmvc.routes[1].id=order-server
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://order-server
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=path=/api/orders
